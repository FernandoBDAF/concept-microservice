# kube-prometheus-stack (pinned 87.17.0 / operator v0.92.1 — ADR-003.1).
# Lab posture: no persistence anywhere (metrics are disposable drill data),
# short retention, admin/admin Grafana. ServiceMonitors/PrometheusRules are
# discovered from ANY namespace regardless of labels (the *NilUsesHelmValues
# flags), so deploy/obs/manifests owns the lab's scrape+alert config.
fullnameOverride: kps

# kind runs these control-plane components on the node network without
# reachable metrics endpoints — scraping them just produces permanent
# TargetDown noise (and would trip our own ScrapeTargetDown alert).
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false

prometheus:
  prometheusSpec:
    retention: 3d
    # nil selectors would limit discovery to Helm-labelled objects; false =
    # pick up every ServiceMonitor/PodMonitor/PrometheusRule in the cluster.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    scrapeConfigSelectorNilUsesHelmValues: false
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    # no storageSpec -> emptyDir; 3d retention fits comfortably.

alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
  config:
    route:
      receiver: ntfy-relay
      group_by: [alertname]
      group_wait: 15s
      group_interval: 2m
      repeat_interval: 4h
      routes:
        # operator heartbeat — not a page
        - receiver: "null"
          matchers:
            - alertname = "Watchdog"
    receivers:
      - name: "null"
      - name: ntfy-relay
        webhook_configs:
          - url: http://ntfy-relay.lab-obs.svc:8080/alert
            send_resolved: true

grafana:
  fullnameOverride: grafana
  adminUser: admin
  adminPassword: admin
  persistence:
    enabled: false
  # kubelet/node dashboards ship with the chart's defaultDashboardsEnabled
  # (on by default); the lab dashboard arrives via the sidecar ConfigMap in
  # deploy/obs/manifests/ (label grafana_dashboard: "1").
  defaultDashboardsEnabled: true
  additionalDataSources:
    - name: Tempo
      uid: tempo
      type: tempo
      access: proxy
      url: http://tempo.lab-obs.svc:3200
      editable: true
  sidecar:
    datasources:
      # Prometheus exemplars (traceID label on histogram samples) deep-link
      # into Tempo — ADR-003.2 "panel <-> trace links work".
      exemplarTraceIdDestinations:
        datasourceUid: tempo
        traceIdLabelName: trace_id
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

kube-state-metrics:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
