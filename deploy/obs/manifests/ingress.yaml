# Observability UIs behind the lab ingress — same hostname/TLS convention as
# deploy/k8s/base/ingress/ingress.yaml (lab-ca ClusterIssuer, *.lab.local via
# /etc/hosts or curl --resolve). Tempo gets no ingress: Grafana explores it.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: lab-obs
  annotations:
    cert-manager.io/cluster-issuer: lab-ca
spec:
  ingressClassName: nginx
  tls:
    - hosts: [grafana.lab.local]
      secretName: grafana-lab-local-tls
  rules:
    - host: grafana.lab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana # kps grafana.fullnameOverride
                port:
                  number: 80
---
