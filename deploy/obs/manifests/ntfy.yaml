# ntfy server (ADR-003.4) — self-hosted push. Subscribe from the phone/
# desktop app pointed at https://ntfy.lab.local (topic lab-alerts), or run
# the relay against ntfy.sh instead (see ntfy-relay.yaml env).
apiVersion: v1
kind: Service
metadata:
  name: ntfy
  namespace: lab-obs
  labels:
    app: ntfy
spec:
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    app: ntfy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy
  namespace: lab-obs
  labels:
    app: ntfy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ntfy
  template:
    metadata:
      labels:
        app: ntfy
    spec:
      containers:
        - name: ntfy
          image: binwiederhier/ntfy:v2.11.0
          args: ["serve"]
          ports:
            - name: http
              containerPort: 80
          env:
            # base-url is what subscription links/QR codes advertise — keep
            # it aligned with the ingress host.
            - name: NTFY_BASE_URL
              value: https://ntfy.lab.local
            - name: NTFY_LISTEN_HTTP
              value: ":80"
            - name: NTFY_BEHIND_PROXY
              value: "true"
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
