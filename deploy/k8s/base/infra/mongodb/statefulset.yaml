# mongodb — mirrors compose `mongodb` (root user admin; password from Secret).
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: lab-infra
  labels:
    app: mongodb
spec:
  clusterIP: None
  ports:
    - name: mongodb
      port: 27017
      targetPort: mongodb
  selector:
    app: mongodb
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: lab-infra
  labels:
    app: mongodb
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - name: mongodb
              containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: admin
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: MONGO_ROOT_PASSWORD
          volumeMounts:
            - name: mongodata
              mountPath: /data/db
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                # quoted: the inner `{ping: 1}` otherwise YAML-parses as a map
                - "mongosh --quiet --eval 'db.adminCommand({ping: 1}).ok' | grep 1"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 8
          livenessProbe:
            tcpSocket:
              port: mongodb
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: mongodata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
