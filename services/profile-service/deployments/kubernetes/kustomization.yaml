apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: profile-service-base

# Base resources for profile service
resources:
  - configmap.yaml
  - secrets.yaml
  - deployment.yaml
  - service.yaml

# Common metadata for all resources
labels:
  - pairs:
      app: profile-service
      version: v1.0.0

commonAnnotations:
  deployment-standard-compliant: "true"
