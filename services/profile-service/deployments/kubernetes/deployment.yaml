apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile-service
  labels:
    app: profile-service
    version: v1.0.0
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: profile-service
  template:
    metadata:
      labels:
        app: profile-service
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: profile-service
          image: profile-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8081
              name: metrics
          env:
            # Server Configuration
            - name: SERVER_HOST
              value: "0.0.0.0"
            - name: SERVER_PORT
              value: "8080"

            # Queue Service Integration - Multi-Worker Architecture
            - name: QUEUE_SERVICE_URL
              value: "http://queue-service:8080"
            - name: QUEUE_SERVICE_TIMEOUT
              value: "30s"
            - name: QUEUE_SERVICE_RETRIES
              value: "3"

            # Multi-Worker Task Timeouts (Based on Performance Testing)
            - name: PROFILE_TASK_TIMEOUT
              value: "5m"
            - name: EMAIL_TASK_TIMEOUT
              value: "2m"
            - name: IMAGE_TASK_TIMEOUT
              value: "10m"

            # Service Dependencies
            - name: STORAGE_SERVICE_HOST
              value: "storage-service"
            - name: STORAGE_SERVICE_PORT
              value: "8080"
            - name: STORAGE_SERVICE_TIMEOUT
              value: "10s"

            - name: AUTH_SERVICE_HOST
              value: "auth-service"
            - name: AUTH_SERVICE_PORT
              value: "8080"
            - name: AUTH_SERVICE_TIMEOUT
              value: "5s"

            - name: CACHE_SERVICE_HOST
              value: "cache-service"
            - name: CACHE_SERVICE_PORT
              value: "8080"
            - name: CACHE_SERVICE_TIMEOUT
              value: "5s"
            - name: CACHE_SERVICE_RETRIES
              value: "3"

            # Monitoring and Observability
            - name: METRICS_ENABLED
              value: "true"
            - name: LOG_LEVEL
              value: "info"
            - name: LOG_FORMAT
              value: "json"

            # Performance Optimizations (Based on Load Testing Results)
            - name: HTTP_MAX_IDLE_CONNS
              value: "100"
            - name: HTTP_MAX_IDLE_CONNS_PER_HOST
              value: "100"
            - name: HTTP_IDLE_CONN_TIMEOUT
              value: "90s"

            # Circuit Breaker Configuration
            - name: CIRCUIT_BREAKER_ENABLED
              value: "true"
            - name: CIRCUIT_BREAKER_THRESHOLD
              value: "5"
            - name: CIRCUIT_BREAKER_TIMEOUT
              value: "30s"

            # Rate Limiting
            - name: RATE_LIMIT_ENABLED
              value: "true"
            - name: RATE_LIMIT_PROFILE_OPS
              value: "100"
            - name: RATE_LIMIT_TASK_SUBMISSIONS
              value: "50"

            # Application Configuration
            - name: LOG_FILE
              value: "/app/logs/app.log"
            - name: CACHE_ENABLED
              value: "true"

            # Cache TTL Configuration
            - name: CACHE_PROFILE_TTL
              value: "1h"
            - name: CACHE_SESSION_TTL
              value: "24h"
            - name: CACHE_TASK_TTL
              value: "30m"

          envFrom:
            - configMapRef:
                name: profile-service-config
            - secretRef:
                name: profile-service-secrets

          # Resource Limits (Based on Performance Testing - 1125+ req/sec capability)
          resources:
            requests:
              memory: "256Mi" # Increased from 128Mi based on testing
              cpu: "200m" # Increased from 100m based on testing
            limits:
              memory: "512Mi" # Increased from 256Mi for high load scenarios
              cpu: "500m" # Increased from 200m for burst capacity

          # Health Check Configuration
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1

          # Startup Probe for slow-starting container
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
            successThreshold: 1

          # Security Context
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          # Volume Mounts
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/cache
            - name: logs
              mountPath: /app/logs

      # Service Account for RBAC
      serviceAccountName: profile-service

      # Security Context for Pod
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      # Volumes
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir:
            sizeLimit: 100Mi
        - name: logs
          emptyDir:
            sizeLimit: 50Mi

      # Node Selection
      nodeSelector:
        kubernetes.io/arch: arm64

      # Tolerations and Affinity
      tolerations:
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 300
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 300

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - profile-service
                topologyKey: kubernetes.io/hostname
