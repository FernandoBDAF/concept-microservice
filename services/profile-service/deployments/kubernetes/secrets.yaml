apiVersion: v1
kind: Secret
metadata:
  name: profile-service-secrets
  labels:
    app: profile-service
type: Opaque
data:
  # Database credentials (base64 encoded)
  # Example: echo -n "your-value" | base64
  DB_PASSWORD: cHJvZmlsZV9zZXJ2aWNlX3Bhc3M= # profile_service_pass
  DB_USER: cHJvZmlsZV91c2Vy # profile_user

  # Cache service credentials (HTTP-based)
  CACHE_SERVICE_API_KEY: Y2FjaGVfc2VydmljZV9hcGlfa2V5 # cache_service_api_key

  # Queue service authentication (if needed)
  QUEUE_SERVICE_API_KEY: cXVldWVfc2VydmljZV9hcGlfa2V5 # queue_service_api_key

  # JWT signing key for authentication
  JWT_SECRET_KEY: anlXVF9zaUduaU5nX2szeV9mb1JfcFJvZmlsZV9zVnI= # JWT_siGniNg_k3y_foR_pRofile_sVr

  # External service credentials
  STORAGE_SERVICE_TOKEN: c3RvcmFnZV9zZXJ2aWNlX3Rva2Vu # storage_service_token
  AUTH_SERVICE_TOKEN: YXV0aF9zZXJ2aWNlX3Rva2Vu # auth_service_token

---
# For local kind development - override with local values
apiVersion: v1
kind: Secret
metadata:
  name: profile-service-secrets-local
  labels:
    app: profile-service
    environment: local
type: Opaque
stringData: # Using stringData for easier local development
  # Local development database
  DB_PASSWORD: "local_dev_pass"
  DB_USER: "profile_user"
  DB_HOST: "postgres-service"
  DB_NAME: "profile_service_dev"

  # Local queue service (no auth needed)
  QUEUE_SERVICE_API_KEY: ""

  # Development JWT key (not secure, for dev only)
  JWT_SECRET_KEY: "dev_jwt_key_not_for_production"

  # Local service tokens (empty for local development)
  STORAGE_SERVICE_TOKEN: ""
  AUTH_SERVICE_TOKEN: ""

  # Local cache service (no auth needed for development)
  CACHE_SERVICE_API_KEY: ""
