syntax = "proto3";

package cache.v1;

option go_package = "cache-service/api/proto";

// CacheService provides high-performance caching operations
service CacheService {
  // Basic operations
  rpc Get(GetRequest) returns (GetResponse);
  rpc Set(SetRequest) returns (SetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc Exists(ExistsRequest) returns (ExistsResponse);
  
  // Batch operations
  rpc BatchGet(BatchGetRequest) returns (BatchGetResponse);
  rpc BatchSet(BatchSetRequest) returns (BatchSetResponse);
  rpc BatchDelete(BatchDeleteRequest) returns (BatchDeleteResponse);
  
  // TTL management
  rpc GetTTL(GetTTLRequest) returns (GetTTLResponse);
  rpc SetTTL(SetTTLRequest) returns (SetTTLResponse);
  
  // Pattern operations
  rpc DeleteByPattern(DeleteByPatternRequest) returns (DeleteByPatternResponse);
  
  // Statistics and health
  rpc GetStats(GetStatsRequest) returns (GetStatsResponse);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// Basic operation messages
message GetRequest {
  string key = 1;
}

message GetResponse {
  bytes value = 1;
  bool found = 2;
}

message SetRequest {
  string key = 1;
  bytes value = 2;
  int64 ttl_seconds = 3; // TTL in seconds, 0 for default
}

message SetResponse {
  bool success = 1;
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {
  bool success = 1;
}

message ExistsRequest {
  string key = 1;
}

message ExistsResponse {
  bool exists = 1;
}

// Batch operation messages
message BatchGetRequest {
  repeated string keys = 1;
}

message BatchGetResponse {
  map<string, bytes> values = 1;
  repeated string missing_keys = 2;
}

message CacheItem {
  string key = 1;
  bytes value = 2;
  int64 ttl_seconds = 3;
}

message BatchSetRequest {
  repeated CacheItem items = 1;
}

message BatchSetResponse {
  bool success = 1;
  int32 count = 2;
}

message BatchDeleteRequest {
  repeated string keys = 1;
}

message BatchDeleteResponse {
  bool success = 1;
  int32 count = 2;
}

// TTL management messages
message GetTTLRequest {
  string key = 1;
}

message GetTTLResponse {
  int64 ttl_seconds = 1; // -1 if no TTL, -2 if key doesn't exist
}

message SetTTLRequest {
  string key = 1;
  int64 ttl_seconds = 2;
}

message SetTTLResponse {
  bool success = 1;
}

// Pattern operation messages
message DeleteByPatternRequest {
  string pattern = 1;
}

message DeleteByPatternResponse {
  bool success = 1;
  int64 deleted_count = 2;
}

// Statistics messages
message GetStatsRequest {}

message GetStatsResponse {
  int64 hits = 1;
  int64 misses = 2;
  int64 evictions = 3;
  int64 total_keys = 4;
  int64 used_memory = 5;
  double hit_ratio = 6;
  int64 last_updated = 7; // Unix timestamp
}

// Health check messages
message HealthCheckRequest {}

message HealthCheckResponse {
  enum Status {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
  }
  Status status = 1;
  string version = 2;
  map<string, bool> checks = 3;
} 