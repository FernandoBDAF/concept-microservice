apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache-service
  annotations:
    deployment.kubernetes.io/environment: "kind-local"
spec:
  # Reduce replicas for local development
  replicas: 1

  template:
    metadata:
      annotations:
        config.kubernetes.io/local-config: "true"
    spec:
      # Remove resource-intensive settings for local dev
      affinity: null
      tolerations: []

      containers:
        - name: cache-service
          # Reduced resource limits for local development
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"

          # Development-friendly environment variables
          env:
            - name: CACHE_LOG_LEVEL
              value: "debug"
            - name: KIND_DEPLOYMENT
              value: "true"
            - name: CACHE_REDIS_HOST
              value: "kind-redis-dev"
            - name: CACHE_REDIS_POOL_SIZE
              value: "20" # Reduced connection pool for local dev

          # Faster health checks for development
          livenessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 10 # Reduced from 30
            periodSeconds: 5 # Reduced from 10
            timeoutSeconds: 3 # Reduced from 5
            failureThreshold: 2 # Reduced from 3

          readinessProbe:
            httpGet:
              path: /ready
              port: http
              scheme: HTTP
            initialDelaySeconds: 5 # Reduced from 10
            periodSeconds: 3 # Reduced from 5
            timeoutSeconds: 2 # Reduced from 3
            failureThreshold: 2 # Reduced from 3

          startupProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 5 # Reduced from 10
            periodSeconds: 3 # Reduced from 5
            timeoutSeconds: 2 # Reduced from 3
            failureThreshold: 10 # Reduced from 30

          # Development volume mounts (simplified)
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
            - name: var-cache
              mountPath: /var/cache

      # Simplified volumes for Kind
      volumes:
        - name: tmp-volume
          emptyDir: {}
        - name: var-cache
          emptyDir: {}

      # Less strict restart policy for development
      restartPolicy: Always
      terminationGracePeriodSeconds: 10 # Reduced from 30

      # Simplified DNS for Kind
      dnsPolicy: ClusterFirst

      # Remove production-specific security contexts for easier debugging
      securityContext:
        runAsNonRoot: false # Allow root for easier debugging in Kind
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
