# Template for production secrets (copy and customize)
apiVersion: v1
kind: Secret
metadata:
  name: storage-service-secrets-template
  labels:
    app: storage-service
    service: storage-service
  annotations:
    description: "Template for production secrets - customize with actual values"
type: Opaque
stringData:
  # DATABASE CONFIGURATION
  # Update with your actual database connection string
  database-url: "postgresql://profile_user:CHANGE_ME@your-postgres-host:5432/profiles"
  database-password: "CHANGE_ME"

  # RABBITMQ CONFIGURATION
  # Update with your actual RabbitMQ connection string
  rabbitmq-url: "amqp://admin:CHANGE_ME@your-rabbitmq-host:5672/"
  rabbitmq-password: "CHANGE_ME"

  # AUTHENTICATION & SECURITY
  # Generate a secure random JWT secret (minimum 32 characters)
  jwt-secret: "GENERATE_SECURE_RANDOM_KEY_HERE"

  # Generate a secure encryption key for sensitive data
  encryption-key: "GENERATE_SECURE_ENCRYPTION_KEY_HERE"

  # API KEYS
  # Add any external service API keys here
  api-key: "YOUR_API_KEY_HERE"

  # ADDITIONAL SECRETS
  # Add any additional secrets your service needs
  # Example:
  # redis-password: "YOUR_REDIS_PASSWORD"
  # oauth-client-secret: "YOUR_OAUTH_CLIENT_SECRET"

---
# Instructions for creating production secrets
apiVersion: v1
kind: ConfigMap
metadata:
  name: storage-service-secrets-instructions
  labels:
    app: storage-service
    service: storage-service
data:
  README.md: |
    # Storage Service Secrets Configuration

    ## Overview
    This directory contains secret templates for the Storage Service.

    ## Production Deployment

    ### Step 1: Copy Template
    ```bash
    cp secrets.yaml secrets-production.yaml
    ```

    ### Step 2: Generate Secure Values

    #### Database Password
    ```bash
    # Generate a secure database password
    openssl rand -base64 32
    ```

    #### JWT Secret
    ```bash
    # Generate a secure JWT secret (minimum 32 characters)
    openssl rand -base64 64
    ```

    #### Encryption Key
    ```bash
    # Generate a secure encryption key
    openssl rand -base64 32
    ```

    ### Step 3: Update Secret Values
    Edit `secrets-production.yaml` and replace all `CHANGE_ME` values with:
    - Database connection strings with actual credentials
    - RabbitMQ connection strings with actual credentials
    - Generated JWT secret
    - Generated encryption key
    - Any additional API keys or secrets

    ### Step 4: Apply Secrets
    ```bash
    kubectl apply -f secrets-production.yaml
    ```

    ### Step 5: Verify Secrets
    ```bash
    kubectl get secrets storage-service-secrets
    kubectl describe secret storage-service-secrets
    ```

    ## Security Best Practices

    1. **Use External Secret Management**: For production, consider using:
       - HashiCorp Vault
       - AWS Secrets Manager
       - Azure Key Vault
       - Google Secret Manager
       - Kubernetes External Secrets Operator

    2. **Encrypt Secrets at Rest**: Enable Kubernetes secrets encryption

    3. **Rotate Secrets Regularly**: Implement secret rotation policies

    4. **Limit Access**: Use RBAC to limit secret access

    5. **Audit Access**: Monitor secret access patterns

    ## Environment-Specific Secrets

    ### Development
    - Use the default values provided in the template
    - Secrets can be less complex for local development

    ### Staging
    - Use production-like secret complexity
    - Separate secrets from production

    ### Production
    - Use maximum security practices
    - External secret management recommended
    - Regular rotation required

    ## Troubleshooting

    ### Secret Not Found
    ```bash
    kubectl get secrets | grep storage-service
    ```

    ### Secret Values
    ```bash
    # View secret keys (not values)
    kubectl describe secret storage-service-secrets

    # Decode secret value (for debugging only)
    kubectl get secret storage-service-secrets -o jsonpath='{.data.database-url}' | base64 -d
    ```

    ### Permission Issues
    ```bash
    # Check service account permissions
    kubectl auth can-i get secrets --as=system:serviceaccount:default:storage-service
    ```
