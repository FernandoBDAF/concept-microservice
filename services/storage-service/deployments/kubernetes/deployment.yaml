apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-service
  labels:
    app: storage-service
    service: storage-service
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: storage-service
  template:
    metadata:
      labels:
        app: storage-service
        service: storage-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: storage-service
      containers:
        - name: storage-service
          image: storage-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
            - containerPort: 9090
              name: grpc
              protocol: TCP
          env:
            # Server Configuration
            - name: SERVER_HOST
              value: "0.0.0.0"
            - name: SERVER_PORT
              value: "8080"
            - name: GRPC_PORT
              value: "9090"

            # Service Discovery
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:8080"
            - name: CACHE_SERVICE_URL
              value: "http://cache-service:8080"
            - name: QUEUE_SERVICE_URL
              value: "http://queue-service:8080"
            - name: PROFILE_SERVICE_URL
              value: "http://profile-service:8080"

            # Database Configuration
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: storage-service-secrets
                  key: database-url
            - name: DATABASE_MAX_CONNECTIONS
              value: "100"
            - name: DATABASE_IDLE_CONNECTIONS
              value: "20"

            # Queue Configuration
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: storage-service-secrets
                  key: rabbitmq-url
            - name: RABBITMQ_QUEUE
              value: "storage-processing"
            - name: RABBITMQ_EXCHANGE
              value: "tasks-exchange"
            - name: RABBITMQ_ROUTING_KEY
              value: "storage.*"
            - name: RABBITMQ_CONSUMER_TAG
              value: "storage-service-consumer"
            - name: RABBITMQ_PREFETCH
              value: "10"
            - name: QUEUE_ENABLED
              value: "true"

            # Dead Letter Queue Configuration
            - name: DLQ_ENABLED
              value: "true"
            - name: DLQ_EXCHANGE_NAME
              value: "storage-dlq"
            - name: DLQ_QUEUE_NAME
              value: "storage-dlq"
            - name: DLQ_MAX_RETRIES
              value: "3"

            # Feature Flags
            - name: METRICS_ENABLED
              value: "true"
            - name: CIRCUIT_BREAKER_ENABLED
              value: "true"
            - name: AUTH_DATA_ENABLED
              value: "true"

            # Logging Configuration
            - name: LOG_LEVEL
              value: "info"
            - name: LOG_ENVIRONMENT
              value: "production"
            - name: SERVICE_NAME
              value: "storage-service"

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1

          startupProbe:
            httpGet:
              path: /health/ready
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
            successThreshold: 1

          # Mount configuration
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: config
          configMap:
            name: storage-service-config
        - name: tmp
          emptyDir: {}

      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"

      # Pod-level security settings
      terminationGracePeriodSeconds: 30
      restartPolicy: Always

      # Node scheduling preferences
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - storage-service
                topologyKey: kubernetes.io/hostname

      # Tolerations for node taints (if needed)
      tolerations: []

      # Image pull secrets (if using private registry)
      imagePullSecrets: []
