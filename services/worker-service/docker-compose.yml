version: "3.8"

services:
  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672" # AMQP port
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_SERVER_START_ARGS: "-rabbit log_levels.connection info"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - worker-network

  # RabbitMQ Setup (runs queue setup script)
  rabbitmq-setup:
    image: curlimages/curl:latest
    container_name: rabbitmq-setup
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./infrastructure/rabbitmq/rabbitmq-setup.sh:/setup.sh:ro
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 15672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    command: ["sh", "/setup.sh"]
    networks:
      - worker-network

  # Email Worker
  email-worker:
    build:
      context: ./services/workers/email-worker
      dockerfile: Dockerfile
    container_name: email-worker
    depends_on:
      rabbitmq-setup:
        condition: service_completed_successfully
    ports:
      - "8081:8080" # Health check port
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - worker-network
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=8080"
      - "prometheus.path=/metrics"

  # Image Worker
  image-worker:
    build:
      context: ./services/workers/image-worker
      dockerfile: Dockerfile
    container_name: image-worker
    depends_on:
      rabbitmq-setup:
        condition: service_completed_successfully
    ports:
      - "8082:8080" # Health check port
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - worker-network
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=8080"
      - "prometheus.path=/metrics"

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=200h"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    networks:
      - worker-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    restart: unless-stopped
    networks:
      - worker-network

  # Test Message Publisher (for development)
  test-publisher:
    image: curlimages/curl:latest
    container_name: test-publisher
    depends_on:
      - email-worker
      - image-worker
    volumes:
      - ./infrastructure/rabbitmq/example-publishers:/publishers:ro
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 15672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    command:
      - sh
      - -c
      - |
        echo "⏳ Waiting for workers to be ready..."
        sleep 30
        echo "📨 Publishing test messages..."
        cd /publishers && sh publish-test-messages.sh
        echo "✅ Test messages sent. Check worker logs!"
        sleep infinity
    networks:
      - worker-network

volumes:
  rabbitmq_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  worker-network:
    driver: bridge
    name: multi-worker-network
