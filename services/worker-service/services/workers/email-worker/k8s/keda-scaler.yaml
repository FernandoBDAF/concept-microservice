apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: email-worker-scaler
  namespace: workers
  labels:
    app: email-worker
    component: worker
    worker-type: email
spec:
  scaleTargetRef:
    name: email-worker
  pollingInterval: 15 # Check queue every 15 seconds
  cooldownPeriod: 60 # Wait 1 minute after last trigger before scaling down
  idleReplicaCount: 2 # Minimum replicas when no messages
  minReplicaCount: 2
  maxReplicaCount: 15
  triggers:
    - type: rabbitmq
      metadata:
        protocol: amqp
        host: amqp://guest:guest@rabbitmq.rabbitmq.svc.cluster.local:5672/
        queueName: email-processing
        queueLength: "10" # Scale up when more than 10 messages in queue
        activationQueueLength: "5" # Start scaling when 5+ messages
      authenticationRef:
        name: rabbitmq-auth
    - type: cpu # Backup CPU-based scaling
      metadata:
        type: Utilization
        value: "70"

---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: rabbitmq-auth
  namespace: workers
spec:
  secretTargetRef:
    - parameter: host
      name: rabbitmq-credentials
      key: host
    - parameter: username
      name: rabbitmq-credentials
      key: username
    - parameter: password
      name: rabbitmq-credentials
      key: password
