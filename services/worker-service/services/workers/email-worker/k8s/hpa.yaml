apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: email-worker-hpa
  namespace: workers
  labels:
    app: email-worker
    component: worker
    worker-type: email
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: email-worker
  minReplicas: 3
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60 # Quick scale up for email bursts
      policies:
        - type: Percent
          value: 100 # Double the replicas quickly
          periodSeconds: 60
        - type: Pods
          value: 5 # Or add 5 pods at once
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300 # Wait 5 minutes before scaling down
      policies:
        - type: Percent
          value: 20 # Scale down more gradually
          periodSeconds: 60
      selectPolicy: Min
