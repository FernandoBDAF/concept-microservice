apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: email-worker-pdb
  namespace: workers
  labels:
    app: email-worker
    component: worker
    worker-type: email
spec:
  minAvailable: 2 # Always keep at least 2 replicas available
  selector:
    matchLabels:
      app: email-worker
