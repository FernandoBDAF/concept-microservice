apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: image-worker-hpa
  namespace: workers
  labels:
    app: image-worker
    component: worker
    worker-type: image
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: image-worker
  minReplicas: 1
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60 # Lower threshold for resource-intensive processing
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 180 # Conservative scale up (3 minutes)
      policies:
        - type: Percent
          value: 50 # Scale up gradually (50% increase)
          periodSeconds: 120
        - type: Pods
          value: 2 # Or add maximum 2 pods at once
          periodSeconds: 120
      selectPolicy: Min # Use the more conservative policy
    scaleDown:
      stabilizationWindowSeconds: 600 # Wait 10 minutes before scaling down
      policies:
        - type: Percent
          value: 25 # Scale down very gradually
          periodSeconds: 180
        - type: Pods
          value: 1 # Remove only 1 pod at a time
          periodSeconds: 180
      selectPolicy: Min
