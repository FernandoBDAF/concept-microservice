apiVersion: v1
kind: Namespace
metadata:
  name: workers
  labels:
    name: workers
    purpose: multi-worker-processing

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-config
  namespace: workers
  labels:
    app: rabbitmq
    component: config
data:
  host: "rabbitmq.rabbitmq.svc.cluster.local"
  port: "5672"
  management_port: "15672"
  # Email Worker Configuration
  email_exchange: "email-tasks"
  email_queue: "email-processing"
  email_routing_key: "email.send"
  email_dlq: "email-processing.dlq"
  email_ttl: "3600000" # 1 hour in milliseconds
  # Image Worker Configuration
  image_exchange: "image-tasks"
  image_queue: "image-processing"
  image_routing_key: "image.process"
  image_dlq: "image-processing.dlq"
  image_ttl: "21600000" # 6 hours in milliseconds

---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-credentials
  namespace: workers
  labels:
    app: rabbitmq
    component: credentials
type: Opaque
data:
  # Default credentials (base64 encoded)
  # username: guest -> Z3Vlc3Q=
  # password: guest -> Z3Vlc3Q=
  username: Z3Vlc3Q=
  password: Z3Vlc3Q=
  host: cmFiYml0bXEucmFiYml0bXEuc3ZjLmNsdXN0ZXIubG9jYWw= # rabbitmq.rabbitmq.svc.cluster.local

---
# RabbitMQ Deployment for local development/testing
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: rabbitmq
  labels:
    app: rabbitmq
    component: message-broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
        component: message-broker
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.12-management-alpine
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: "guest"
            - name: RABBITMQ_DEFAULT_PASS
              value: "guest"
            - name: RABBITMQ_SERVER_START_ARGS
              value: "-rabbit log_levels.connection info"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - ping
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 15
          readinessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - check_port_connectivity
            initialDelaySeconds: 20
            periodSeconds: 60
            timeoutSeconds: 10
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
      volumes:
        - name: rabbitmq-data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: rabbitmq
  labels:
    app: rabbitmq
    component: message-broker
spec:
  type: ClusterIP
  ports:
    - port: 5672
      targetPort: 5672
      protocol: TCP
      name: amqp
    - port: 15672
      targetPort: 15672
      protocol: TCP
      name: management
  selector:
    app: rabbitmq

---
# Create rabbitmq namespace
apiVersion: v1
kind: Namespace
metadata:
  name: rabbitmq
  labels:
    name: rabbitmq
    purpose: message-broker
