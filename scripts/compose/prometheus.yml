# Prometheus scrape config for the compose stack (CONTRACTS.md §5).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: api-service
    static_configs:
      - targets: ["api-service:8081"]

  - job_name: auth-service
    static_configs:
      - targets: ["auth-service:3000"]

  - job_name: graphrag-service
    static_configs:
      - targets: ["graphrag-service:8081"]

  - job_name: workers
    static_configs:
      - targets:
          - "email-worker:8080"
          - "image-worker:8080"
          - "profile-worker:8080"

  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"]
