# Guest isolation (ADR-007.2): same zero-trust model as lab-core —
# default-deny both directions, DNS opened for all pods, then exactly two
# ingress paths: the shared obs stack scraping /metrics on every component,
# and the shared ingress controller reaching web. No egress besides DNS:
# hello-guest talks to nobody, which is the point.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: hello-guest
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: hello-guest
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# The shared observability stack (lab-obs) may scrape any hello-guest pod on
# 8080 — this is how a netpol-isolated guest stays visible (HOST_CONTRACT §2).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-obs-scrape
  namespace: hello-guest
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lab-obs
      ports:
        - protocol: TCP
          port: 8080
---
# web is reachable from the shared ingress controller only (hostname
# hello-guest.lab.local). The worker has no ingress path at all; kubelet
# probes bypass NetworkPolicy by design.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-web
  namespace: hello-guest
spec:
  podSelector:
    matchLabels:
      app: hello-guest-web
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
