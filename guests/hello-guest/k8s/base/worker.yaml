# hello-guest worker — no Service traffic besides scraping; the Service
# exists so the ServiceMonitor in ../obs has something to select.
apiVersion: v1
kind: Service
metadata:
  name: hello-guest-worker
  namespace: hello-guest
  labels:
    app: hello-guest-worker
    lab.local/guest: hello-guest
spec:
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app: hello-guest-worker
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-guest-worker
  namespace: hello-guest
  labels:
    app: hello-guest-worker
    lab.local/guest: hello-guest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-guest-worker
  template:
    metadata:
      labels:
        app: hello-guest-worker
        lab.local/guest: hello-guest
        lab.local/role: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: worker
          image: localhost:5001/hello-guest-worker:dev
          imagePullPolicy: Always
          env:
            - name: HELLO_JOB_INTERVAL
              value: 2s
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
