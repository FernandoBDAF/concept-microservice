# hello-guest launch definition — HOST_CONTRACT.md §1.3 (schema v0).
# All commands run from the repo root.
name: hello-guest
description: Minimal two-component guest proving the host contract (ADR-001.4).
port_block: "41xx"

targets:
  compose:
    up: docker compose -f guests/hello-guest/docker-compose.yml up -d --build
    down: docker compose -f guests/hello-guest/docker-compose.yml down
    status: docker compose -f guests/hello-guest/docker-compose.yml ps
  kind:
    up: |
      docker build --build-arg CMD=web -t localhost:5001/hello-guest-web:dev guests/hello-guest
      docker build --build-arg CMD=worker -t localhost:5001/hello-guest-worker:dev guests/hello-guest
      docker push localhost:5001/hello-guest-web:dev
      docker push localhost:5001/hello-guest-worker:dev
      kubectl apply -k guests/hello-guest/k8s/base
      kubectl -n hello-guest rollout status deploy/hello-guest-web deploy/hello-guest-worker --timeout=120s
    down: kubectl delete -k guests/hello-guest/k8s/base --ignore-not-found
    status: kubectl -n hello-guest get pods,svc,ingress

links:
  - name: web (compose)
    url: http://localhost:4100/
  - name: web metrics (compose)
    url: http://localhost:4100/metrics
  - name: worker metrics (compose)
    url: http://localhost:4110/metrics
  - name: web (kind)
    url: https://hello-guest.lab.local/

components:
  - name: web
    ports:
      - { name: http, container: 8080, compose_host: 4100 }
    metrics_path: /metrics
  - name: worker
    ports:
      - { name: http, container: 8080, compose_host: 4110 }
    metrics_path: /metrics
