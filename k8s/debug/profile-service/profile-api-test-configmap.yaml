apiVersion: v1
kind: ConfigMap
metadata:
  name: profile-api-test-scripts
data:
  profile-api-test.py: |
    #!/usr/bin/env python3
    import requests
    import json
    import os
    import sys
    import time
    import uuid

    # Configuration
    PROFILE_API_URL = "http://profile-api"
    AUTH_ENDPOINT = f"{PROFILE_API_URL}/api/v1/auth/token"
    PROFILES_ENDPOINT = f"{PROFILE_API_URL}/api/v1/profiles"

    def get_auth_token():
        """Get authentication token from the auth service."""
        print("\n=== Getting Auth Token ===")
        payload = {
            "user_id": "test_user",
            "password": "test_password"
        }
        
        try:
            print(f"Requesting token from: {AUTH_ENDPOINT}")
            print(f"Payload: {json.dumps(payload, indent=2)}")
            response = requests.post(AUTH_ENDPOINT, json=payload)
            print(f"Response status: {response.status_code}")
            print(f"Response headers: {json.dumps(dict(response.headers), indent=2)}")
            response.raise_for_status()
            token = response.json().get("token")
            print(f"Successfully obtained token: {token}")
            return token
        except requests.exceptions.RequestException as e:
            print(f"Error getting auth token: {e}")
            if hasattr(e.response, 'text'):
                print(f"Error response: {e.response.text}")
            sys.exit(1)

    def create_profile(token):
        """Create a new profile and return its ID."""
        print("\n=== Creating Profile ===")
        headers = {
            "Authorization": f"Bearer {token}",
            "Content-Type": "application/json"
        }
        
        # Generate a unique email using UUID
        unique_id = str(uuid.uuid4())[:8]
        payload = {
            "first_name": "Test",
            "last_name": "User",
            "email": f"test.user.{unique_id}@example.com"
        }
        
        try:
            print(f"Creating profile at: {PROFILES_ENDPOINT}")
            print(f"Headers: {json.dumps(headers, indent=2)}")
            print(f"Payload: {json.dumps(payload, indent=2)}")
            response = requests.post(PROFILES_ENDPOINT, headers=headers, json=payload)
            print(f"Response status: {response.status_code}")
            print(f"Response headers: {json.dumps(dict(response.headers), indent=2)}")
            response.raise_for_status()
            profile = response.json().get("profile")
            profile_id = profile.get("id")
            print(f"Successfully created profile with ID: {profile_id}")
            return profile_id
        except requests.exceptions.RequestException as e:
            print(f"Error creating profile: {e}")
            if hasattr(e.response, 'text'):
                print(f"Error response: {e.response.text}")
            sys.exit(1)

    def create_task(token, profile_id):
        """Create a task for the specified profile."""
        print("\n=== Creating Task ===")
        headers = {
            "Authorization": f"Bearer {token}",
            "Content-Type": "application/json"
        }
        
        task_endpoint = f"{PROFILES_ENDPOINT}/{profile_id}/tasks"
        payload = {
            "type": "PROFILE_UPDATE",
            "payload": {
                "first_name": "Updated",
                "last_name": "Name"
            }
        }
        
        try:
            print(f"Creating task at: {task_endpoint}")
            print(f"Headers: {json.dumps(headers, indent=2)}")
            print(f"Payload: {json.dumps(payload, indent=2)}")
            response = requests.post(task_endpoint, headers=headers, json=payload)
            print(f"Response status: {response.status_code}")
            print(f"Response headers: {json.dumps(dict(response.headers), indent=2)}")
            response.raise_for_status()
            print("Successfully created task")
            print(f"Response: {response.json()}")
        except requests.exceptions.RequestException as e:
            print(f"Error creating task: {e}")
            if hasattr(e.response, 'text'):
                print(f"Error response: {e.response.text}")
            sys.exit(1)

    def main():
        print("Starting Profile API Tests...")
        
        # Get auth token
        token = get_auth_token()
        
        # Create profile
        profile_id = create_profile(token)
        
        # Create task
        create_task(token, profile_id)
        
        print("\n=== All tests completed successfully ===")

    if __name__ == "__main__":
        main()
