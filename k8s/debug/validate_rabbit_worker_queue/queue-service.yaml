apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-service-test
  labels:
    app: queue-service-test
    service: validate-queue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: queue-service-test
      service: validate-queue
  template:
    metadata:
      labels:
        app: queue-service-test
        service: validate-queue
    spec:
      containers:
        - name: queue-service
          image: queue-service:latest
          env:
            - name: RABBITMQ_HOST
              value: rabbitmq-test
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-test-secrets
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-test-secrets
                  key: RABBITMQ_PASSWORD
            - name: RABBITMQ_VHOST
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-test-secrets
                  key: RABBITMQ_VHOST
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: queue-service-test
  labels:
    app: queue-service-test
    service: validate-queue
spec:
  selector:
    app: queue-service-test
    service: validate-queue
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
