apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service
  labels:
    app: worker-service
    service: profile
    app.kubernetes.io/part-of: profile-service
    app.kubernetes.io/managed-by: kustomize
    environment: development
    tier: worker
  annotations:
    description: Worker Service Base Configuration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-service
      service: profile
  template:
    metadata:
      labels:
        app: worker-service
        service: profile
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: worker-service
          image: worker-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: worker-service-config
                  key: rabbitmq_url
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: worker-service-config
                  key: log_level
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: config-volume
              mountPath: /etc/worker-service
      volumes:
        - name: config-volume
          configMap:
            name: worker-service-config
