apiVersion: v1
kind: Secret
metadata:
  name: queue-service-secrets
  labels:
    app: queue-service
    tier: queue
type: Opaque
data:
  # These are example values, replace with actual base64 encoded values
  RABBITMQ_USERNAME: cmFiYml0bXEtdXNlcg== # rabbitmq-user
  RABBITMQ_PASSWORD: cmFiYml0bXEtcGFzc3dvcmQ= # rabbitmq-password
  RABBITMQ_VHOST: Lw== # /
  JWT_SECRET: c2VjcmV0LWtleQ== # secret-key
