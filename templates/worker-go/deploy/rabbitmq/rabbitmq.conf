# Load the broker-owned topology at boot (ADR-008.4). definitions.json is
# generated by scripts/generate-definitions.py (use --full so it carries the
# vhost + guest user this file needs). Services verify it passively and never
# declare topology themselves.
load_definitions = /etc/rabbitmq/definitions.json

# Expose the Prometheus scrape endpoint on 15692 (management image bundles it).
prometheus.return_per_object_metrics = true
