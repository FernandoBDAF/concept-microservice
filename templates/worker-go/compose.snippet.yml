# Compose snippet for the worker-go template — rabbitmq + redis + the worker.
# Copy these services into your repo's docker-compose.yml (or run this file
# directly with `docker compose -f compose.snippet.yml up`). test/bootstrap.sh
# uses exactly this topology.
#
# The broker loads its topology from definitions.json at boot (ADR-008.4);
# services verify it passively and never declare. Generate that file first:
#   python3 scripts/generate-definitions.py --pipeline example:example.task \
#       --full -o deploy/rabbitmq/definitions.json
services:
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # management API / UI
    volumes:
      # broker-owned topology loaded at boot (ADR-008.4)
      - ./deploy/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./deploy/rabbitmq/rabbitmq.conf:/etc/rabbitmq/conf.d/20-lab.conf:ro
    healthcheck:
      # check_port_connectivity, not ping: the node answers ping before the
      # AMQP listener accepts, so dependents crash-loop at boot otherwise.
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      # idempotency guard (ADR-008.2); empty → in-memory guard + warn (dev only)
      REDIS_ADDR: redis:6379
      # OpenTelemetry (ADR-003.2): empty → tracing off (no-op provider)
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      OTEL_SERVICE_NAME: example-worker
      HEALTH_PORT: "8080"
    ports:
      - "8080:8080" # /health /ready /metrics
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
