apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphrag-service
  labels:
    app: graphrag-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: graphrag-service
  template:
    metadata:
      labels:
        app: graphrag-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: graphrag-service
          image: graphrag-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: health
            - containerPort: 8081
              name: metrics
          env:
            - name: RABBITMQ_HOST
              value: "rabbitmq"
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_PASSWORD
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-atlas-secret
                  key: MONGODB_URI
            - name: MONGODB_DATABASE
              value: "graphrag"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: graphrag-secret
                  key: OPENAI_API_KEY
            - name: MINIO_ENDPOINT
              value: "minio:9000"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_SECRET_KEY
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: "2000m"
              memory: "6Gi"
            limits:
              cpu: "4000m"
              memory: "10Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
