apiVersion: batch/v1
kind: Job
metadata:
  name: queue-test
spec:
  template:
    spec:
      containers:
        - name: queue-test
          image: queue-test:latest
          imagePullPolicy: Never
          env:
            - name: RABBITMQ_URL
              value: "amqp://user:password@rabbitmq:5672/"
      restartPolicy: Never
  backoffLimit: 0
