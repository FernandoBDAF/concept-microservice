apiVersion: v1
kind: Service
metadata:
  name: email-worker-service
  namespace: workers
  labels:
    app: email-worker
    component: worker
    worker-type: email
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: email-worker
