apiVersion: v1
kind: Service
metadata:
  name: image-worker-service
  namespace: workers
  labels:
    app: image-worker
    component: worker
    worker-type: image
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: image-worker
