apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: image-worker-pdb
  namespace: workers
  labels:
    app: image-worker
    component: worker
    worker-type: image
spec:
  minAvailable: 1 # Always keep at least 1 replica available
  selector:
    matchLabels:
      app: image-worker
