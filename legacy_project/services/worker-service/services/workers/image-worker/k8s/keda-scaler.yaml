apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: image-worker-scaler
  namespace: workers
  labels:
    app: image-worker
    component: worker
    worker-type: image
spec:
  scaleTargetRef:
    name: image-worker
  pollingInterval: 30 # Check queue every 30 seconds (less frequent than email)
  cooldownPeriod: 300 # Wait 5 minutes after last trigger before scaling down
  idleReplicaCount: 1 # Minimum replicas when no messages
  minReplicaCount: 1
  maxReplicaCount: 8
  triggers:
    - type: rabbitmq
      metadata:
        protocol: amqp
        host: amqp://guest:guest@rabbitmq.rabbitmq.svc.cluster.local:5672/
        queueName: image-processing
        queueLength: "5" # Scale up when more than 5 messages (conservative)
        activationQueueLength: "2" # Start scaling when 2+ messages
      authenticationRef:
        name: rabbitmq-auth
    - type: cpu # Backup CPU-based scaling
      metadata:
        type: Utilization
        value: "60" # Lower threshold for resource-intensive work

---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: rabbitmq-auth
  namespace: workers
spec:
  secretTargetRef:
    - parameter: host
      name: rabbitmq-credentials
      key: host
    - parameter: username
      name: rabbitmq-credentials
      key: username
    - parameter: password
      name: rabbitmq-credentials
      key: password
