apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: email-worker-metrics
  namespace: workers
  labels:
    app: email-worker
    component: worker
    worker-type: email
spec:
  selector:
    matchLabels:
      app: email-worker
  endpoints:
    - port: http
      path: /metrics
      interval: 10s
      scrapeTimeout: 5s
      honorLabels: true

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: image-worker-metrics
  namespace: workers
  labels:
    app: image-worker
    component: worker
    worker-type: image
spec:
  selector:
    matchLabels:
      app: image-worker
  endpoints:
    - port: http
      path: /metrics
      interval: 10s
      scrapeTimeout: 5s
      honorLabels: true

---
# PodMonitor for worker pods (alternative to ServiceMonitor)
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: worker-pods-metrics
  namespace: workers
  labels:
    app: multi-workers
    component: monitoring
spec:
  selector:
    matchLabels:
      component: worker
  podMetricsEndpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
