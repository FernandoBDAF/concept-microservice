apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: multi-worker-alerts
  namespace: workers
  labels:
    app: multi-workers
    component: monitoring
spec:
  groups:
    - name: email-worker-alerts
      interval: 30s
      rules:
        - alert: EmailWorkerHighErrorRate
          expr: rate(email_processing_errors_total[5m]) > 0.1
          for: 2m
          labels:
            severity: warning
            worker_type: email
          annotations:
            summary: "Email worker has high error rate"
            description: "Email worker error rate is {{ $value }} errors/second over the last 5 minutes"

        - alert: EmailWorkerHighLatency
          expr: email_processing_time_seconds{quantile="0.95"} > 30
          for: 1m
          labels:
            severity: warning
            worker_type: email
          annotations:
            summary: "Email worker has high processing latency"
            description: "Email worker 95th percentile latency is {{ $value }}s"

        - alert: EmailWorkerDown
          expr: up{job="email-worker"} == 0
          for: 1m
          labels:
            severity: critical
            worker_type: email
          annotations:
            summary: "Email worker is down"
            description: "Email worker has been down for more than 1 minute"

        - alert: EmailQueueBacklog
          expr: email_messages_in_flight > 50
          for: 5m
          labels:
            severity: warning
            worker_type: email
          annotations:
            summary: "Email queue has large backlog"
            description: "Email queue has {{ $value }} messages in flight"

    - name: image-worker-alerts
      interval: 30s
      rules:
        - alert: ImageWorkerHighErrorRate
          expr: rate(image_processing_errors_total[5m]) > 0.05
          for: 2m
          labels:
            severity: warning
            worker_type: image
          annotations:
            summary: "Image worker has high error rate"
            description: "Image worker error rate is {{ $value }} errors/second over the last 5 minutes"

        - alert: ImageWorkerHighLatency
          expr: image_processing_time_seconds{quantile="0.95"} > 120
          for: 2m
          labels:
            severity: warning
            worker_type: image
          annotations:
            summary: "Image worker has high processing latency"
            description: "Image worker 95th percentile latency is {{ $value }}s"

        - alert: ImageWorkerDown
          expr: up{job="image-worker"} == 0
          for: 1m
          labels:
            severity: critical
            worker_type: image
          annotations:
            summary: "Image worker is down"
            description: "Image worker has been down for more than 1 minute"

        - alert: ImageWorkerHighResourceUsage
          expr: rate(container_cpu_usage_seconds_total{pod=~"image-worker-.*"}[5m]) > 0.8
          for: 3m
          labels:
            severity: warning
            worker_type: image
          annotations:
            summary: "Image worker using high CPU"
            description: "Image worker CPU usage is {{ $value }} over the last 5 minutes"

        - alert: ImageQueueBacklog
          expr: image_messages_in_flight > 20
          for: 5m
          labels:
            severity: warning
            worker_type: image
          annotations:
            summary: "Image queue has large backlog"
            description: "Image queue has {{ $value }} messages in flight"

    - name: worker-scaling-alerts
      interval: 60s
      rules:
        - alert: EmailWorkerScalingIssue
          expr: kube_deployment_status_replicas{deployment="email-worker"} != kube_deployment_spec_replicas{deployment="email-worker"}
          for: 5m
          labels:
            severity: warning
            worker_type: email
          annotations:
            summary: "Email worker scaling issue"
            description: "Email worker desired replicas ({{ $labels.kube_deployment_spec_replicas }}) != actual replicas ({{ $labels.kube_deployment_status_replicas }})"

        - alert: ImageWorkerScalingIssue
          expr: kube_deployment_status_replicas{deployment="image-worker"} != kube_deployment_spec_replicas{deployment="image-worker"}
          for: 5m
          labels:
            severity: warning
            worker_type: image
          annotations:
            summary: "Image worker scaling issue"
            description: "Image worker desired replicas ({{ $labels.kube_deployment_spec_replicas }}) != actual replicas ({{ $labels.kube_deployment_status_replicas }})"

    - name: rabbitmq-alerts
      interval: 30s
      rules:
        - alert: RabbitMQConnectionDown
          expr: up{job="rabbitmq"} == 0
          for: 1m
          labels:
            severity: critical
            component: rabbitmq
          annotations:
            summary: "RabbitMQ is down"
            description: "RabbitMQ has been down for more than 1 minute"

        - alert: RabbitMQHighQueueDepth
          expr: rabbitmq_queue_messages{queue=~"(email-processing|image-processing)"} > 100
          for: 5m
          labels:
            severity: warning
            component: rabbitmq
          annotations:
            summary: "RabbitMQ queue depth is high"
            description: "Queue {{ $labels.queue }} has {{ $value }} messages"
