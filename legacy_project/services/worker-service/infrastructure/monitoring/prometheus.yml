global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/*.yml"

scrape_configs:
  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Email Worker
  - job_name: "email-worker"
    static_configs:
      - targets: ["email-worker:8080"]
    metrics_path: "/metrics"
    scrape_interval: 10s
    scrape_timeout: 5s
    honor_labels: true
    params:
      format: ["prometheus"]

  # Image Worker
  - job_name: "image-worker"
    static_configs:
      - targets: ["image-worker:8080"]
    metrics_path: "/metrics"
    scrape_interval: 10s
    scrape_timeout: 5s
    honor_labels: true
    params:
      format: ["prometheus"]

  # RabbitMQ (if metrics plugin is enabled)
  - job_name: "rabbitmq"
    static_configs:
      - targets: ["rabbitmq:15692"]
    metrics_path: "/metrics"
    scrape_interval: 15s
    scrape_timeout: 10s

# Alerting configuration (for future use)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
