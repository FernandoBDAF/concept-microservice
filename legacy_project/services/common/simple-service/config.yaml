# Server configuration
server:
  port: 8080
  host: localhost
  timeout: 30s

# Logging configuration
logging:
  level: info
  format: json
  output: console

# Security configuration
security:
  jwt_secret: "your-secret-key"
  token_expiry: 24h
  password_hash_cost: 10

# Metrics configuration
metrics:
  enabled: true
  prometheus:
    enabled: true
    path: /metrics
    port: 9090

# Database configuration
database:
  host: localhost
  port: 5432
  name: users
  user: postgres
  password: postgres
  ssl_mode: disable
