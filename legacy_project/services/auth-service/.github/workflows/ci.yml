name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: auth_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: auth_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test:coverage
        env:
          NODE_ENV: test
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: auth_db
          DATABASE_USER: auth_user
          DATABASE_PASSWORD: test_password
          JWT_SECRET: test-secret-key-at-least-32-characters-long

      - name: Build
        run: npm run build

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t auth-service:${{ github.sha }} .

      - name: Test Docker image
        run: |
          docker run --rm -d --name auth-test \
            -e JWT_SECRET=test-secret-key-at-least-32-characters-long \
            -e DATABASE_PASSWORD=test \
            -e NODE_ENV=test \
            auth-service:${{ github.sha }}
          sleep 5
          docker logs auth-test
          docker stop auth-test

